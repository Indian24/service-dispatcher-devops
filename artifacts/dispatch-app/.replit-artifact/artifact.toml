kind = "web"
previewPath = "/"
title = "Technician Dispatch & Service Tracking"
version = "1.0.0"
id = "artifacts/dispatch-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19494

[services.development]
run = "pnpm --filter @workspace/dispatch-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dispatch-app", "run", "build" ]
publicDir = "artifacts/dispatch-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19494"
BASE_PATH = "/"
